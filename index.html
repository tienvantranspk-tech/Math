<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Toán Lớp 1 - Cánh Diều</title>

    <!-- Tailwind CDN (ok để test nhanh; production nên cài Tailwind chuẩn) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Roboto:wght@400;500;700&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Roboto", sans-serif;
      }
      .font-hand {
        font-family: "Patrick Hand", cursive;
      }
      @media print {
        .no-print {
          display: none !important;
        }
        .print-break-inside-avoid {
          break-inside: avoid;
        }
        body {
          background: white;
        }
      }
    </style>

    <!-- Import map for ESM -->
    <script type="importmap">
      {
        "imports": {
          "react-dom/": "https://esm.sh/react-dom@19.2.0/",
          "react/": "https://esm.sh/react@19.2.0/",
          "react": "https://esm.sh/react@19.2.0",
          "lucide-react": "https://esm.sh/lucide-react@0.563.0"
        }
      }
    </script>
  <link rel="stylesheet" href="/index.css">
</head>

  <body class="bg-blue-50">
    <div id="root"></div>

    <!-- ✅ THIS is the missing part: mount React into #root -->
    <script type="module">
      import React from "react";
      import { createRoot } from "react-dom/client";

      // Bạn có thể thay toàn bộ App() bằng app thật của bạn sau
      function App() {
        return React.createElement(
          "div",
          { className: "min-h-screen flex items-center justify-center p-6" },
          React.createElement(
            "div",
            { className: "bg-white rounded-2xl shadow p-6 max-w-xl w-full" },
            React.createElement(
              "h1",
              { className: "text-2xl font-bold mb-2 font-hand text-blue-700" },
              "Toán Lớp 1 - Cánh Diều"
            ),
            React.createElement(
              "p",
              { className: "text-gray-700" },
              "✅ Deploy Vercel đã render React thành công. Bây giờ bạn thay App bằng UI/Component thật."
            )
          )
        );
      }

      createRoot(document.getElementById("root")).render(
        React.createElement(App)
      );
    </script>
  <script type="module" src="/index.tsx"></script>
</body>
